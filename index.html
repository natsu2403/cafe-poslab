<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>簡易POS</title>

  <style>
#history li {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#history button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  padding: 0;
  line-height: 1;
}
    
    #cart li {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #cart button {
      margin-left: 10px;
    }

    .hidden { display: none; }

    .container {
      display: flex;
    }

    .left {
      width: 65%;
    }


    .right {
  width: 35%;
  position: sticky;
  top: 0;
  background: #f4f6f8;
  padding: 20px;
  height: 100vh;
  box-shadow: -2px 0 10px rgba(0,0,0,0.1);

  display: flex;
  flex-direction: column;
}
#cart {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 10px;
}
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      padding: 12px;
      font-size: 16px;
    }

    .right button {
      width: 100%;
      margin-top: 10px;
      font-size: 18px;
    }
#cart button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  line-height: 1;
}

.right h3 {
  margin-top: 0;
}

.right button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.right button:hover {
  background: #555;
}

#adminPanel {
  margin-top: 20px;
  padding: 15px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

#adminPanel input {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}


#cart {
  max-height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
}
.checkout-area {
  position: sticky;
  bottom: 0;
  background: #f4f6f8;
  padding-top: 10px;
}
.payment-buttons {
  display: flex;
  gap: 10px;
}

.payment-buttons button {
  flex: 1;
}

/* 選択されてるボタン */
.active-payment {
  background: #4CAF50 !important;
}
.total-area {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 24px;
  font-weight: bold;
}

#numberPad {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  z-index: 999;
  text-align: center;
  padding-top: 50px;
}

#displayNumber {
  font-size: 40px;
  margin: 20px;
}

.pad {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 10px;
  justify-content: center;
}

.pad button {
  font-size: 20px;
  padding: 20px;
}
  </style>

</head>

<body>

<!-- 画面切り替え -->
<button onclick="showScreen('register')">レジ</button>
<button onclick="showScreen('historyScreen')">履歴・売上</button>

<hr>

<!-- ===== レジ画面 ===== -->
<div id="register">

  <div class="container">

    <!-- 左 -->
    <div class="left">
    <h2>商品</h2>
<div id="productList" class="grid"></div>
      </div>
  
    <!-- 右 -->
    <div class="right">
<h2>注文内容</h2>

<ul id="cart"></ul>

<div class="total-area">
  <span>合計</span>
  <span><span id="total">0</span> 円</span>
</div>

<hr>
      <h3>支払い方法</h3>
      <div class="payment-buttons">
  <button id="btnCash" onclick="setPayment('現金')">現金</button>
  <button id="btnPaypay" onclick="setPayment('PayPay')">PayPay</button>
</div>
<div id="cashArea" class="hidden">
  <p>支払金額</p>
  <input type="number" id="paidAmount" oninput="calcChange()">

  <p>お釣り：<span id="change">0</span> 円</p>
</div>

      <p>選択中: <span id="payment">未選択</span></p>

      <div class="checkout-area">
  <button onclick="checkout()">会計</button>
</div>
<div id="adminPanel" class="hidden">
  <h3>商品追加（管理者）</h3>
  <input type="text" id="newName" placeholder="商品名">
  <input type="number" id="newPrice" placeholder="価格">
  <button onclick="addProduct()">追加</button>
</div>

    </div>

  </div>

</div>

<!-- ===== 履歴画面 ===== -->
<div id="historyScreen" class="hidden">

  <h2>会計履歴</h2>
  <ul id="history"></ul>

  <button onclick="toggleToday()">今日だけ表示</button>
<button onclick="adminLogin()">管理者ログイン</button>

<div id="adminControls" class="hidden">
  <button onclick="clearHistory()">履歴全削除</button>
  <button onclick="setPassword()">パスワード設定</button>
  <button onclick="adminLogout()">ログアウト</button>
</div>

  <h3>日別売上</h3>
  <div id="dailySales"></div>

  <h2>メニュー別売上</h2>

<button onclick="showMenuSales()">表示</button>
<button onclick="clearMenuSales()">売上リセット</button>

<div id="menuSales"></div>

</div>

<div id="numberPad" class="hidden">
  <h2>受け取り番号を入力</h2>

  <div id="displayNumber">0</div>

  <div class="pad">
    <button onclick="inputNumber(1)">1</button>
    <button onclick="inputNumber(2)">2</button>
    <button onclick="inputNumber(3)">3</button>
    <button onclick="inputNumber(4)">4</button>
    <button onclick="inputNumber(5)">5</button>
    <button onclick="inputNumber(6)">6</button>
    <button onclick="inputNumber(7)">7</button>
    <button onclick="inputNumber(8)">8</button>
    <button onclick="inputNumber(9)">9</button>
    <button onclick="clearNumber()">C</button>
    <button onclick="inputNumber(0)">0</button>
    <button onclick="confirmNumber()">決定</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
